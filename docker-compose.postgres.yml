services:
  postgres:
    image: postgres:16-alpine
    container_name: mutual-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mutual_hub
      POSTGRES_USER: mutual_hub
      POSTGRES_PASSWORD: mutual_hub
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mutual_hub -d mutual_hub']
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mutual-hub-postgres-data:/var/lib/postgresql/data

volumes:
  mutual-hub-postgres-data: