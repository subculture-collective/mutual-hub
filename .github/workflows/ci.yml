name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    quality-gates:
        runs-on: ubuntu-latest
        timeout-minutes: 25

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

            - name: Moderation + privacy regression gate (Phase 7)
              run: npm run test:phase7

            - name: Unit tests
              run: npm run test

            - name: E2E request-to-handoff flow (Phase 8.2)
              run: npm run test:phase8-e2e

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
              working-directory: apps/web

            - name: Browser E2E tests (Phase 8.2)
              run: npm run test:e2e -w @mutual-hub/web

            - name: Build
              run: npm run build
