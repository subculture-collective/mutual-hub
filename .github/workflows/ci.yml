name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    quality-gates:
        runs-on: ubuntu-latest
        timeout-minutes: 25

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

            - name: Moderation + privacy regression gate (Phase 7)
              run: npm run test:phase7

            - name: Unit tests
              run: npm run test

            - name: Build
              run: npm run build
